<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TempoSnap — Cronómetro, Temporizador, Alarma</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2300e5ff' opacity='0.15'/%3E%3Ccircle cx='50' cy='50' r='38' fill='none' stroke='%2300e5ff' stroke-width='6'/%3E%3Cline x1='50' y1='50' x2='50' y2='28' stroke='%2300e5ff' stroke-width='5' stroke-linecap='round'/%3E%3Cline x1='50' y1='50' x2='66' y2='58' stroke='%2300e5ff' stroke-width='5' stroke-linecap='round'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%2300e5ff'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-scroll">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="20" height="20" viewBox="0 0 100 100" fill="none">
                        <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="7"/>
                        <line x1="50" y1="50" x2="50" y2="26" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                        <line x1="50" y1="50" x2="68" y2="60" stroke="currentColor" stroke-width="6" stroke-linecap="round"/>
                        <circle cx="50" cy="50" r="5" fill="currentColor"/>
                    </svg>
                    <span>TempoSnap</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-section="cronometro">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Cronómetro
                </button>
                <button class="nav-btn" data-section="temporizador">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M10 2h4"/><path d="M12 14v-4"/><path d="M4 13a8 8 0 0 1 8-7 8 8 0 1 1-8 7z"/></svg>
                    Temporizador
                </button>
                <button class="nav-btn" data-section="alarma">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    Alarma
                </button>
                <button class="nav-btn" data-section="reloj">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 12 12"/></svg>
                    Reloj
                </button>
            </nav>
        </div>

        <div class="sidebar-bottom">
            <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">
                <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
        </div>
    </aside>

    <!-- ===== OVERLAY ===== -->
    <div class="overlay" id="overlay"></div>

    <!-- ===== MAIN ===== -->
    <main class="main">
        <div class="main-inner">

            <!-- Header móvil -->
            <div class="mobile-top">
                <button class="mobile-menu" id="menuBtn" aria-label="Menú">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span class="mobile-logo">TempoSnap</span>
                <button class="mobile-theme" id="mobileThemeBtn" aria-label="Cambiar tema">
                    <svg class="sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>

            <!-- ==================== CRONÓMETRO ==================== -->
            <section class="section active" id="section-cronometro">
                <div class="section-center">
                    <div class="badge-section">⏱ Cronómetro</div>

                    <div class="display-wrap">
                        <div class="display" id="cronoDisplay">00:00.00</div>
                        <div class="display-extra" id="cronoExtra"></div>
                    </div>

                    <div class="controls">
                        <button class="btn btn-primary" id="cronoStart">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                            Iniciar
                        </button>
                        <button class="btn btn-secondary" id="cronoVuelta" disabled>
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                            Vuelta
                        </button>
                        <button class="btn btn-ghost" id="cronoReset" style="display:none">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                            Reiniciar
                        </button>
                    </div>

                    <div class="config">
                        <div class="config-group">
                            <label for="cronoColor">Color</label>
                            <input type="color" id="cronoColor" value="#00e5ff" />
                        </div>
                        <div class="config-group">
                            <label for="cronoSise">Tamaño</label>
                            <div class="config-slider">
                                <input type="range" id="cronoSise" min="2" max="5.5" step="0.25" value="3.75" />
                                <span class="config-val" id="cronoSizeVal">3.75</span>
                            </div>
                        </div>
                    </div>

                    <div class="laps">
                        <div class="laps-head">
                            <h3>Vueltas</h3>
                            <span class="laps-badge" id="cronoBadge">0</span>
                        </div>
                        <div class="laps-body" id="cronoBody">
                            <p class="laps-empty" id="cronoEmpty">Aún no hay vueltas registradas</p>
                            <table class="laps-table" id="cronoTable" style="display:none">
                                <thead><tr><th>#</th><th>Vuelta</th><th>Total</th></tr></thead>
                                <tbody id="cronoTbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ==================== TEMPORIZADOR ==================== -->
            <section class="section" id="section-temporizador">
                <div class="section-center">
                    <div class="badge-section">⏳ Temporizador</div>

                    <div class="timer-set" id="timerSet">
                        <div class="timer-inputs">
                            <div class="timer-input-group">
                                <label for="timerHours">Horas</label>
                                <input type="number" id="timerHours" min="0" max="99" value="0" />
                            </div>
                            <span class="timer-sep">:</span>
                            <div class="timer-input-group">
                                <label for="timerMins">Minutos</label>
                                <input type="number" id="timerMins" min="0" max="59" value="1" />
                            </div>
                            <span class="timer-sep">:</span>
                            <div class="timer-input-group">
                                <label for="timerSecs">Segundos</label>
                                <input type="number" id="timerSecs" min="0" max="59" value="0" />
                            </div>
                        </div>
                        <button class="btn btn-primary" id="timerStartBtn">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                            Iniciar
                        </button>
                    </div>

                    <div class="display-wrap" id="timerDisplayWrap" style="display:none">
                        <div class="display timer-display" id="timerDisplay">00:00.00</div>
                        <div class="display-extra" id="timerExtra"></div>
                        <div class="timer-controls">
                            <button class="btn btn-secondary" id="timerPauseBtn">Pausa</button>
                            <button class="btn btn-ghost" id="timerStopBtn">Detener</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- ==================== ALARMA ==================== -->
            <section class="section" id="section-alarma">
                <div class="section-center">
                    <div class="badge-section">🔔 Alarma</div>

                    <div class="alarm-set">
                        <div class="alarm-clock" id="alarmClock">--:--:--</div>
                        <p class="alarm-now" id="alarmNow">Cargando...</p>

                        <div class="alarm-inputs">
                            <div class="timer-input-group">
                                <label for="alarmHour">Hora</label>
                                <input type="number" id="alarmHour" min="0" max="23" value="8" />
                            </div>
                            <span class="timer-sep">:</span>
                            <div class="timer-input-group">
                                <label for="alarmMin">Minutos</label>
                                <input type="number" id="alarmMin" min="0" max="59" value="0" />
                            </div>
                        </div>

                        <button class="btn btn-primary" id="alarmSetBtn">
                            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                            Activar alarma
                        </button>

                        <div class="alarm-status" id="alarmStatus"></div>
                    </div>
                </div>
            </section>

            <!-- ==================== RELOJ ==================== -->
            <section class="section" id="section-reloj">
                <div class="section-center">
                    <div class="badge-section">🕐 Reloj</div>

                    <div class="display-wrap clock-wrap">
                        <div class="display clock-display" id="clockDisplay">00:00:00</div>
                        <div class="display-extra" id="clockDate"></div>
                    </div>

                    <div class="clock-format">
                        <button class="btn btn-ghost active" id="clock24h">Formato 24h</button>
                        <button class="btn btn-ghost" id="clock12h">Formato 12h</button>
                    </div>
                </div>
            </section>

        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
