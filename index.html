<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TempoSnap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-inner">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span>TempoSnap</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-section="cronometro">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    <span>Cronómetro</span>
                </button>
                <button class="nav-btn" data-section="temporizador">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 2h4"/><path d="M12 14v-4"/><path d="M4 13a8 8 0 0 1 8-7 8 8 0 1 1-8 7z"/>
                    </svg>
                    <span>Temporizador</span>
                </button>
                <button class="nav-btn" data-section="alarma">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    <span>Alarma</span>
                </button>
                <button class="nav-btn" data-section="reloj">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 12 12"/>
                    </svg>
                    <span>Reloj</span>
                </button>
            </nav>
        </div>
    </aside>

    <!-- ===== OVERLAY (móvil) ===== -->
    <div class="overlay" id="overlay"></div>

    <!-- ===== MAIN ===== -->
    <main class="main">

        <!-- Header móvil -->
        <div class="mobile-header">
            <button class="menu-btn" id="menuBtn" aria-label="Menú">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <span class="mobile-logo">TempoSnap</span>
        </div>

        <!-- ===== SECCIÓN CRONÓMETRO ===== -->
        <section class="section active" id="section-cronometro">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Cronómetro</h1>
                    <p class="page-desc">Precisión de centésimas de segundo</p>
                </div>
                <div class="prec-badge">⏱ 00:00.00</div>
            </div>

            <!-- Display -->
            <div class="display-wrap">
                <div class="display" id="display">00:00.00</div>
                <div class="display-extra" id="displayExtra"></div>
            </div>

            <!-- Controles -->
            <div class="controls">
                <button class="btn btn-primary" id="btnStart">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    Iniciar
                </button>
                <button class="btn btn-secondary" id="btnLap" disabled>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Vuelta
                </button>
                <button class="btn btn-ghost" id="btnReset" style="display:none">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                    Reiniciar
                </button>
            </div>

            <!-- Config -->
            <div class="config">
                <div class="config-group">
                    <label class="config-label" for="colorInput">Color</label>
                    <input type="color" id="colorInput" value="#00e5ff" />
                </div>
                <div class="config-group">
                    <label class="config-label" for="sizeRange">Tamaño</label>
                    <div class="config-slider">
                        <input type="range" id="sizeRange" min="2" max="5.5" step="0.25" value="3.75" />
                        <span class="config-val" id="sizeVal">3.75</span>
                    </div>
                </div>
            </div>

            <!-- Vueltas -->
            <div class="laps">
                <div class="laps-head">
                    <h2 class="laps-title">Vueltas</h2>
                    <span class="laps-badge" id="lapsBadge">0</span>
                </div>
                <div class="laps-body" id="lapsBody">
                    <p class="laps-empty" id="lapsEmpty">Aún no hay vueltas registradas</p>
                    <table class="laps-table" id="lapsTable" style="display:none">
                        <thead>
                            <tr><th>#</th><th>Vuelta</th><th>Total</th></tr>
                        </thead>
                        <tbody id="lapsTbody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <!-- ===== SECCIÓN TEMPORIZADOR ===== -->
        <section class="section" id="section-temporizador">
            <div class="page-header">
                <h1 class="page-title">Temporizador</h1>
                <p class="page-desc">Cuenta regresiva</p>
            </div>
            <div class="placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 2h4"/><path d="M12 14v-4"/><path d="M4 13a8 8 0 0 1 8-7 8 8 0 1 1-8 7z"/></svg>
                <p>Próximamente</p>
            </div>
        </section>

        <!-- ===== SECCIÓN ALARMA ===== -->
        <section class="section" id="section-alarma">
            <div class="page-header">
                <h1 class="page-title">Alarma</h1>
                <p class="page-desc">Despertador</p>
            </div>
            <div class="placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                <p>Próximamente</p>
            </div>
        </section>

        <!-- ===== SECCIÓN RELOJ ===== -->
        <section class="section" id="section-reloj">
            <div class="page-header">
                <h1 class="page-title">Reloj</h1>
                <p class="page-desc">Hora actual</p>
            </div>
            <div class="placeholder">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 12 12"/></svg>
                <p>Próximamente</p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
